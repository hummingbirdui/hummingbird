name: Test & Build

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_SITE_URL: https://hbui.dev
          PUBLIC_STAGING_SITE_URL: https://staging.hbui.dev

      - name: Verify build outputs
        run: |
          [[ -d "packages/hummingbird/lib" ]] || exit 1
          [[ -d "packages/browser/dist" ]] || exit 1
          [[ -f "packages/create-hummingbird-app/index.js" ]] || exit 1

      - name: Run tests
        run: pnpm -C packages/browser test:ui
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/browser/test-results/
            packages/browser/blob-report/
          retention-days: 30
          if-no-files-found: ignore
